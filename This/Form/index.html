<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add User</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 via-purple-100 to-green-100 min-h-screen flex flex-col items-center p-10">

  <!-- FORM -->
  <form id="userForm" class="bg-white rounded-xl shadow-xl p-8 w-full max-w-lg">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Add User</h2>

    <div class="mb-4">
      <label class="block mb-1 font-medium">Name</label>
      <input type="text" name="name" required
        class="w-full px-4 py-2 border rounded-lg">
    </div>

    <div class="mb-4">
      <label class="block mb-1 font-medium">Role</label>
      <input type="text" name="role" required
        class="w-full px-4 py-2 border rounded-lg">
    </div>

    <div class="mb-4">
      <label class="block mb-1 font-medium">Bio</label>
      <textarea name="bio" required
        class="w-full px-4 py-2 border rounded-lg"></textarea>
    </div>

    <div class="mb-6">
      <label class="block mb-1 font-medium">Profile Pic URL</label>
      <input type="text" name="pic" required
        class="w-full px-4 py-2 border rounded-lg">
    </div>

    <button type="submit"
      class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
      Submit
    </button>
  </form>

  
  <div id="userList" class="mt-10 w-full max-w-lg"></div>

  <script>
    const form = document.getElementById("userForm");
    const userList = document.getElementById("userList");

  
    document.addEventListener("DOMContentLoaded", showUsers);

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const newUser = {
        id: Date.now(),
        name: form.name.value,
        role: form.role.value,
        bio: form.bio.value,
        pic: form.pic.value
      };

      let users = JSON.parse(localStorage.getItem("users")) || [];
      users.push(newUser);

      localStorage.setItem("users", JSON.stringify(users));

      form.reset();
      showUsers();
    });

    function showUsers() {
      const users = JSON.parse(localStorage.getItem("users")) || [];
      userList.innerHTML = "";

      users.forEach(user => {
        userList.innerHTML += `
          <div class="bg-white shadow-lg rounded-lg p-4 mb-4">
            <img src="${user.pic}" class="w-20 h-20 rounded-full mb-2 object-cover">
            <h3 class="text-lg font-bold">${user.name}</h3>
            <p class="text-blue-500">${user.role}</p>
            <p class="text-gray-600">${user.bio}</p>
          </div>
        `;
      });
    }
  </script>

</body>
</html>
