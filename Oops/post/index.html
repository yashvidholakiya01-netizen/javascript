<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SocialFlow | Post Creation</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body {

            background: radial-gradient(circle at top left, #fffbeb, #fef3c7, #fde68a);

            min-height: 100vh;

        }

        .glass {

            background: rgba(255, 255, 255, 0.7);

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.3);

        }

 </style>

</head>

<body class="p-5 md:p-10 font-sans text-amber-900">

​

    <header class="text-center mb-12 animate__animated animate__fadeInDown">

        <h1 class="text-4xl font-black tracking-tight text-amber-800">Social<span class="text-amber-600">Flow</span></h1>

        <p class="text-amber-700/60 font-medium">Share your moments with the world</p>

    </header>

​

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">

        

        <section class="lg:col-span-4 animate__animated animate__fadeInLeft">
            <div class="glass p-8 rounded-3xl shadow-2xl border-t border-white">

                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">

                    <span>✨</span> Create New Post

                </h2>

                <form id="postForm" class="space-y-4">

                    <div>

                        <label class="block text-sm font-bold mb-1 ml-2">Profile Image URL</label>

                        <input type="text" id="dp" placeholder="https://..." 

                            class="w-full bg-white/50 border-2 border-amber-200 rounded-2xl px-4 py-3 outline-none focus:border-amber-500 transition-all shadow-sm" />

                    </div>

                    

                    <div>

                        <label class="block text-sm font-bold mb-1 ml-2">Username</label>

                        <input type="text" id="name" placeholder="@username" 

                            class="w-full bg-white/50 border-2 border-amber-200 rounded-2xl px-4 py-3 outline-none focus:border-amber-500 transition-all shadow-sm" />

                    </div>

​
